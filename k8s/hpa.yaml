apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: pqc-jwt

spec:

  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service

  minReplicas: 2
  maxReplicas: 8

  metrics:

  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70


  behavior:

    scaleUp:

      stabilizationWindowSeconds: 30

      policies:

      - type: Percent
        value: 100
        periodSeconds: 30


    scaleDown:

      stabilizationWindowSeconds: 120

      policies:

      - type: Percent
        value: 25
        periodSeconds: 60