apiVersion: v1
kind: PersistentVolume
metadata:
  name: cert-pv

spec:
  capacity:
    storage: 1Gi

  accessModes:
    - ReadOnlyMany

  storageClassName: manual

  hostPath:
    path: /mnt/certs

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cert-pvc
  namespace: pqc-jwt

spec:
  accessModes:
    - ReadOnlyMany

  storageClassName: manual

  volumeName: cert-pv

  resources:
    requests:
      storage: 1Gi